name: Update GEX Levels

on:
  schedule:
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance numpy pandas scipy
      - name: Run calculator
        run: python scripts/calcular_niveles.py
      - name: Commit levels.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/levels.json
          git diff --staged --quiet || git commit -m "Update levels $(date -u +%Y-%m-%d)"
          git push
