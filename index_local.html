<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEX Lab Levels - Local</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; font-weight: 600; color: #58a6ff; }
  header span { font-size: 12px; color: #8b949e; background: #21262d; padding: 2px 8px; border-radius: 12px; }
  .live-badge { font-size: 11px !important; background: rgba(46,160,67,0.2) !important; color: #2ea043 !important; border: 1px solid #2ea043 !important; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .search-bar { display: flex; gap: 12px; margin-bottom: 24px; }
  .search-bar input { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 16px; color: #e6edf3; font-size: 15px; outline: none; text-transform: uppercase; }
  .search-bar input:focus { border-color: #58a6ff; }
  .search-bar button { background: #238636; border: none; border-radius: 8px; padding: 10px 20px; color: white; font-size: 15px; cursor: pointer; font-weight: 600; min-width: 110px; }
  .search-bar button:hover { background: #2ea043; }
  .search-bar button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
  .quick-tickers { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; align-items: center; }
  .quick-tickers span { font-size: 12px; color: #8b949e; }
  .quick-tickers button { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; color: #8b949e; font-size: 13px; cursor: pointer; }
  .quick-tickers button:hover { border-color: #58a6ff; color: #58a6ff; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .card-header h2 { font-size: 22px; font-weight: 700; }
  .timestamp { font-size: 11px; color: #8b949e; margin-top: 4px; text-align: right; }
  .levels { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .level-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-radius: 8px; }
  .level-ceiling { background: rgba(46,160,67,0.15); border-left: 3px solid #2ea043; }
  .level-mid { background: rgba(210,153,34,0.1); border-left: 3px solid #d4a017; }
  .level-pivot { background: rgba(88,166,255,0.1); border-left: 3px solid #58a6ff; }
  .level-floor { background: rgba(248,81,73,0.15); border-left: 3px solid #f85149; }
  .level-name { font-size: 13px; color: #8b949e; font-weight: 500; }
  .level-value { font-size: 18px; font-weight: 700; }
  .spot-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; margin-bottom: 8px; background: #21262d; border-radius: 8px; }
  .spot-label { font-size: 12px; color: #8b949e; }
  .spot-value { font-size: 15px; font-weight: 600; }
  .oi-row { display: flex; gap: 16px; margin-bottom: 20px; }
  .oi-box { flex: 1; background: #21262d; border-radius: 8px; padding: 10px 14px; }
  .oi-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .oi-value { font-size: 14px; font-weight: 600; }
  .oi-calls { color: #2ea043; }
  .oi-puts { color: #f85149; }
  .pine-section label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 6px; }
  .pine-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: #7ee787; line-height: 1.6; white-space: pre; overflow-x: auto; }
  .copy-btn { margin-top: 8px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; color: #8b949e; font-size: 12px; cursor: pointer; }
  .copy-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .loading { text-align: center; padding: 40px; color: #8b949e; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: rgba(248,81,73,0.1); border: 1px solid #f85149; border-radius: 8px; padding: 16px; color: #f85149; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .bullish { color: #2ea043; }
  .bearish { color: #f85149; }
</style>
</head>
<body>
<header>
  <h1>⚗️ GEX Lab Levels</h1>
  <span>Options Structure Analysis</span>
  <span class="live-badge">● LOCAL</span>
</header>
<div class="container">
  <div class="search-bar">
    <input type="text" id="tickerInput" placeholder="Enter any ticker (e.g. TSLA, PYPL, CRWD)" />
    <button id="analyzeBtn" onclick="searchTicker()">Analyze</button>
  </div>
  <div class="quick-tickers">
    <span>Quick:</span>
    <button onclick="loadTicker('AAPL')">AAPL</button>
    <button onclick="loadTicker('MSFT')">MSFT</button>
    <button onclick="loadTicker('NVDA')">NVDA</button>
    <button onclick="loadTicker('TSLA')">TSLA</button>
    <button onclick="loadTicker('AMZN')">AMZN</button>
    <button onclick="loadTicker('META')">META</button>
    <button onclick="loadTicker('GOOGL')">GOOGL</button>
    <button onclick="loadTicker('AMD')">AMD</button>
    <button onclick="loadTicker('SOFI')">SOFI</button>
    <button onclick="loadTicker('COIN')">COIN</button>
    <button onclick="loadTicker('PLTR')">PLTR</button>
    <button onclick="loadTicker('NFLX')">NFLX</button>
  </div>
  <div id="output"></div>
  <div id="allLevels" class="grid"></div>
</div>

<script>
var BACKEND = 'http://localhost:8000';
var allData = [];

function formatNumber(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n;
}

function buildPine(ticker, n) {
  var lines = [
    '//@version=5',
    'indicator("GEX Levels - ' + ticker + '", overlay=true)',
    'hline(' + n.ceiling + ', "Ceiling", color.new(color.green, 0), linewidth=2)',
    'hline(' + n.mid_high + ', "Mid High", color.new(color.yellow, 0), linewidth=1)',
    'hline(' + n.pivot + ', "Pivot", color.new(color.white, 0), linewidth=2)',
    'hline(' + n.mid_low + ', "Mid Low", color.new(color.yellow, 0), linewidth=1)',
    'hline(' + n.floor + ', "Floor", color.new(color.red, 0), linewidth=2)'
  ];
  return lines.join('\n');
}

function renderCard(d) {
  var n = d.niveles;
  var spot = d.spot;
  var biasClass = spot > n.pivot ? 'bullish' : 'bearish';
  var biasText = spot > n.pivot ? '▲ Bullish' : '▼ Bearish';
  var pine = d.pine_script ? d.pine_script.replace(/\\n/g, '\n') : buildPine(d.ticker, n);
  var cardId = 'pine-' + d.ticker;

  var html = '<div class="card">';
  html += '<div class="card-header">';
  html += '<h2>' + d.ticker + '</h2>';
  html += '<div><span class="' + biasClass + '">' + biasText + '</span>';
  html += '<div class="timestamp">Updated: ' + d.timestamp + '</div></div>';
  html += '</div>';
  html += '<div class="spot-row"><span class="spot-label">Current Price</span><span class="spot-value">$' + spot + '</span></div>';
  html += '<div class="levels">';
  html += '<div class="level-row level-ceiling"><span class="level-name">Ceiling</span><span class="level-value" style="color:#2ea043">$' + n.ceiling + '</span></div>';
  html += '<div class="level-row level-mid"><span class="level-name">Mid High</span><span class="level-value" style="color:#d4a017">$' + n.mid_high + '</span></div>';
  html += '<div class="level-row level-pivot"><span class="level-name">Pivot</span><span class="level-value" style="color:#58a6ff">$' + n.pivot + '</span></div>';
  html += '<div class="level-row level-mid"><span class="level-name">Mid Low</span><span class="level-value" style="color:#d4a017">$' + n.mid_low + '</span></div>';
  html += '<div class="level-row level-floor"><span class="level-name">Floor</span><span class="level-value" style="color:#f85149">$' + n.floor + '</span></div>';
  html += '</div>';
  html += '<div class="oi-row">';
  html += '<div class="oi-box"><div class="oi-label">OI Calls</div><div class="oi-value oi-calls">' + formatNumber(n.oi_calls) + '</div></div>';
  html += '<div class="oi-box"><div class="oi-label">OI Puts</div><div class="oi-value oi-puts">' + formatNumber(n.oi_puts) + '</div></div>';
  html += '</div>';
  html += '<div class="pine-section"><label>Pine Script — copy to TradingView</label>';
  html += '<div class="pine-box" id="' + cardId + '">' + pine + '</div>';
  html += '<button class="copy-btn" onclick="copyPine(\'' + cardId + '\')">Copy Pine Script</button>';
  html += '</div></div>';
  return html;
}

function copyPine(id) {
  var el = document.getElementById(id);
  navigator.clipboard.writeText(el.textContent).then(function() {
    alert('Pine Script copied!');
  });
}

function renderAll() {
  document.getElementById('allLevels').innerHTML = allData.map(renderCard).join('');
}

function loadTicker(t) {
  document.getElementById('tickerInput').value = t;
  searchTicker();
}

function searchTicker() {
  var t = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!t) return;
  var btn = document.getElementById('analyzeBtn');
  var output = document.getElementById('output');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>...';
  output.innerHTML = '<div class="loading"><span class="spinner"></span>Fetching live data for ' + t + '...</div>';

  fetch(BACKEND + '/levels/' + t)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        output.innerHTML = '<div class="error">' + data.error + '</div>';
      } else {
        output.innerHTML = renderCard(data);
      }
      btn.disabled = false;
      btn.innerHTML = 'Analyze';
    })
    .catch(function(e) {
      output.innerHTML = '<div class="error">Error connecting to backend. Try again in a moment — Render free tier may be waking up (30s).</div>';
      btn.disabled = false;
      btn.innerHTML = 'Analyze';
    });
}

document.getElementById('tickerInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchTicker();
});

// Load cached data from GitHub Actions
fetch('data/levels.json?t=' + Date.now())
  .then(function(res) { return res.json(); })
  .then(function(data) {
    allData = data;
    renderAll();
  })
  .catch(function() {});
</script>
</body>
</html>
